experiment_name: sanity
seed: 42

data:
  grid_size: 26
  obstacle_density: 0.25
  num_train: 40000
  num_val: 5000
  num_test: 10000
  data_dir: data/grids_26x26_d25
  num_workers: 4

model:
  arch: trm
  dim: 64
  num_heads: 4
  num_layers: 2
  num_classes: 5
  T: 1
  n: 2
  halting: false

training:
  batch_size: 8
  grad_accum_steps: 1
  num_epochs: 10
  lr: 1.0e-3
  weight_decay: 0.01
  grad_clip: 1.0
  mixed_precision: bf16
  gradient_checkpointing: false
  ema_decay: 0.999
  use_ema: false
  halt_loss_weight: 0.0
  early_stopping_patience: 10

logging:
  log_dir: logs/sanity
  checkpoint_dir: checkpoints/sanity
  log_every_n_steps: 50
  eval_every_n_epochs: 1
  rerun_viz: false