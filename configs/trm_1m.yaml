# Small/fast TRM variant — reduced width and reasoning depth for faster training.
# dim 64, num_heads 4 (head_dim 48), n 4 => ~1.2M params (base is 4.82M).
seed: 42

data:
  grid_size: 26
  obstacle_density: 0.25
  num_train: 40000
  num_val: 5000
  num_test: 10000
  data_dir: data/grids_26x26_d25
  num_workers: 4

model:
  arch: trm # trm | cnn
  dim: 64
  num_heads: 4 # head_dim = 3*dim/num_heads = 48 (must be divisible by 4 for 2D RoPE)
  num_layers: 2
  num_classes: 5 # N, S, E, W, stay
  T: 3 # supervision steps (deep supervision)
  n: 4 # reasoning recursions per supervision step
  halting: true

training:
  batch_size: 32
  num_epochs: 10
  lr: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  halt_loss_weight: 0.1
  deep_supervision: true # compute the loss at every step (not just the last)
  ema_decay: 0.999 # EMA smoothing for evaluation and the saved checkpoint

logging:
  log_dir: logs/trm_1m
  checkpoint_dir: checkpoints/trm_1m
  log_every_n_steps: 50
  viz_samples: 5 # log this many fixed val samples to rerun each epoch (0 = off)
