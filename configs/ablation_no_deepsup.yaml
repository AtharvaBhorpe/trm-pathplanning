# Ablation: no deep supervision — loss only on the final step (vs all T steps)
seed: 42

data:
  grid_size: 26
  obstacle_density: 0.25
  num_train: 40000
  num_val: 5000
  num_test: 10000
  data_dir: data/grids_26x26_d25
  num_workers: 4

model:
  arch: trm
  dim: 128
  num_heads: 8
  num_layers: 2
  num_classes: 5
  T: 3
  n: 6
  halting: true

training:
  batch_size: 16
  num_epochs: 40
  lr: 1.0e-3
  weight_decay: 0.01
  grad_clip: 1.0
  halt_loss_weight: 1.0
  deep_supervision: false  # ablated: supervise only the final step
  ema_decay: 0.999

logging:
  log_dir: logs/trm_no_deepsup
  checkpoint_dir: checkpoints/trm_no_deepsup
  log_every_n_steps: 50
