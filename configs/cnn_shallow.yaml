# Shallow CNN baseline — 4 conv blocks, wide (~1.2M params, param-matched to trm_1m).
# Receptive field = 1 + 2*num_layers = 9 cells, so it CANNOT see across a 26x26 grid.
# Paired with cnn_deep.yaml to isolate the receptive-field effect at equal capacity.
seed: 42

data:
  grid_size: 26
  obstacle_density: 0.25
  num_train: 40000
  num_val: 5000
  num_test: 10000
  data_dir: data/grids_26x26_d25
  num_workers: 4

model:
  arch: cnn # trm | cnn
  dim: 64 # embedding width fed into the conv stack
  num_classes: 5 # N, S, E, W, stay
  width: 200 # uniform conv channels -> ~1.2M params at num_layers 4
  num_layers: 4 # receptive field 9x9

training:
  batch_size: 32 # matched to trm_1m
  num_epochs: 10
  lr: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  halt_loss_weight: 0.0 # CNN has no halt head
  deep_supervision: true # single supervision step for the CNN (T=1)
  ema_decay: 0.999

logging:
  log_dir: logs/cnn_shallow
  checkpoint_dir: checkpoints/cnn_shallow
  log_every_n_steps: 50
  viz_samples: 0
